<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Craftville - Hjemmeside</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/themes/splide-default.min.css"
    />
  </head>

  <body>
    <section class="splide">
      <div class="hero-heading-main">
        <h1>Craftville</h1>
      </div>
      <div class="splide__track">
        <ul class="splide__list">
          <li class="splide__slide">
            <img
              src="./media/GALLERY/Charlie.jpg"
              alt="An outline painting of Charlie with akvarell"
            />
          </li>
          <li class="splide__slide">
            <img
              src="./media/GALLERY/Rolling.jpg"
              alt="A group portraite of the band rolling stones with akvarell"
            />
          </li>
          <li class="splide__slide">
            <img
              src="./media/GALLERY/Dreamcatcher.jpg"
              alt="A portrait of a woman in pencil"
            />
          </li>
        </ul>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

    <script>
      var splide = new Splide(".splide", {
        type: "loop",
        padding: "5rem",
      });

      splide.mount();
    </script>
  </body>
</html>
