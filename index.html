<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Craftville - Hjemmeside</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/themes/splide-default.min.css"
    />
  </head>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">CRAFTVILLE</a>
      <div class="nav-links">
        <a href="booking.html">Booking</a>
        <a href="review.html">Anmeldelser</a>
        <a href="gallery.html">Galleri</a>
      </div>
    </div>
  </nav>

  <body>
    <section class="splide">
      <div class="hero-heading-main">
        <h1>Craftville</h1>
      </div>
      <div class="splide__track">
        <ul class="splide__list">
          <li class="splide__slide">
            <img
              src="./media/GALLERY/painting_ladies_medium.jpg"
              alt="Placeholder picture"
            />
          </li>
          <li class="splide__slide">
            <img
              src="./media/GALLERY/painting_south_medium.jpg"
              alt="Placeholder picture"
            />
          </li>
          <li class="splide__slide">
            <img
              src="./media/GALLERY/watercolor_north_medium.jpg"
              alt="Placeholder picture"
            />
          </li>
        </ul>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

    <script>
      var splide = new Splide(".splide", {
        type: "loop",
        padding: "5rem",
      });

      splide.mount();
    </script>
  </body>
</html>
